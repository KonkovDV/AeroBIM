# AeroBIM local development stack
#
# Auth hygiene (Red Team 2026-07-20): LOCAL DEMO only — published on loopback.
# Anonymous API is OFF by default. Opt in explicitly for local demos.
# Shared/LAN/production-like: docker-compose.production.yml + real secrets.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      # Bind host loopback only — do not expose unauthenticated/dev API on LAN.
      - "127.0.0.1:8080:8080"
    environment:
      AEROBIM_ENV: ${AEROBIM_ENV:-development}
      AEROBIM_SIGNOFF_PROFILE: ${AEROBIM_SIGNOFF_PROFILE:-development}
      AEROBIM_HOST: "0.0.0.0"
      AEROBIM_PORT: "8080"
      AEROBIM_DEBUG: ${AEROBIM_DEBUG:-true}
      AEROBIM_STORAGE_DIR: /data/reports
      AEROBIM_CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      # Optional. Prefer exporting the var; never commit secrets.
      # WARNING: do not put the token in VITE_* (it is bundled into browser assets).
      AEROBIM_API_BEARER_TOKEN: ${AEROBIM_API_BEARER_TOKEN:-}
      # Explicit opt-in only (default false). Set AEROBIM_ALLOW_ANONYMOUS_DEV=true for local demos.
      AEROBIM_ALLOW_ANONYMOUS_DEV: ${AEROBIM_ALLOW_ANONYMOUS_DEV:-false}
    volumes:
      - reports-data:/data/reports
      - ./samples:/data/samples:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  reports-data:
