# AeroBIM local development stack
#
# Auth hygiene (audit 2026-07-20): this file is LOCAL DEMO only.
# It defaults to AEROBIM_ENV=development — never ships production + a baked-in token.
# For shared/LAN/production-like runs use docker-compose.production.yml + real secrets.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AEROBIM_ENV: ${AEROBIM_ENV:-development}
      AEROBIM_SIGNOFF_PROFILE: ${AEROBIM_SIGNOFF_PROFILE:-development}
      AEROBIM_HOST: "0.0.0.0"
      AEROBIM_PORT: "8080"
      AEROBIM_DEBUG: ${AEROBIM_DEBUG:-true}
      AEROBIM_STORAGE_DIR: /data/reports
      AEROBIM_CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      # Optional for local development. Prefer exporting the var; never commit secrets.
      # WARNING: do not put the token in VITE_* (it is bundled into browser assets).
      AEROBIM_API_BEARER_TOKEN: ${AEROBIM_API_BEARER_TOKEN:-}
      AEROBIM_ALLOW_ANONYMOUS_DEV: ${AEROBIM_ALLOW_ANONYMOUS_DEV:-true}
    volumes:
      - reports-data:/data/reports
      - ./samples:/data/samples:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  reports-data:
