# AeroBIM local development stack
# Auth is required: bearer token must be set (fail-closed if removed in production).
# Prefer AEROBIM_ENV=production for any shared/LAN exposure.
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      AEROBIM_ENV: production
      AEROBIM_SIGNOFF_PROFILE: production
      AEROBIM_HOST: "0.0.0.0"
      AEROBIM_PORT: "8080"
      AEROBIM_DEBUG: "false"
      AEROBIM_STORAGE_DIR: /data/reports
      AEROBIM_CORS_ORIGINS: "http://localhost:3000,http://localhost:5173"
      # REQUIRED. Change before any shared use. Frontend must send the same token.
      # WARNING: if you put this value in VITE_*, it is bundled into browser assets (demo-only).
      AEROBIM_API_BEARER_TOKEN: "dev-local-token-change-me"
    volumes:
      - reports-data:/data/reports
      - ./samples:/data/samples:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  reports-data:
