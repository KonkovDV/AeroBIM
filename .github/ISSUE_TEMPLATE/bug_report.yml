name: Bug report
description: Report a reproducible bug in AeroBIM
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps, sample input, and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, package versions, IFC/IDS fixtures used.
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      render: shell
