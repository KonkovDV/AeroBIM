name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      benchmark_iterations:
        description: "Measured iterations per benchmark pack"
        required: false
        default: "1"
      benchmark_warmup_iterations:
        description: "Warmup iterations per benchmark pack"
        required: false
        default: "0"
      benchmark_threshold_mode:
        description: "Threshold gate mode for benchmark evaluation"
        required: true
        type: choice
        default: advisory
        options:
          - advisory
          - enforced
      benchmark_threshold_profile:
        description: "Path (relative to backend/) to threshold profile JSON"
        required: false
        default: "../samples/benchmarks/benchmark-thresholds.json"
      run_live_smoke:
        description: "Run the optional live review smoke job"
        required: true
        type: boolean
        default: false
      require_live_smoke_gate:
        description: "Fail the workflow unless live smoke is enabled for this run"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  live-smoke-policy-check:
    runs-on: ubuntu-latest
    steps:
      - name: Validate live-smoke gate policy
        run: |
          if [ "${{ inputs.require_live_smoke_gate }}" = "true" ] && [ "${{ inputs.run_live_smoke }}" != "true" ]; then
            echo "Live-smoke gate is required, but run_live_smoke=false."
            echo "Re-run workflow with run_live_smoke=true or disable require_live_smoke_gate."
            exit 1
          fi

  benchmark-rails:
    runs-on: ubuntu-latest
    needs: live-smoke-policy-check
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -e ".[dev,vision]"
      - name: Run baseline benchmark pack
        run: |
          mkdir -p ../artifacts/release-readiness
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-baseline.json \
            --iterations "${{ inputs.benchmark_iterations }}" \
            --warmup-iterations "${{ inputs.benchmark_warmup_iterations }}" \
            --storage-dir ./var/reports-ci-benchmark-baseline \
            > ../artifacts/release-readiness/benchmark-baseline.json
      - name: Run fire-compliance benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-fire-compliance.json \
            --iterations "${{ inputs.benchmark_iterations }}" \
            --warmup-iterations "${{ inputs.benchmark_warmup_iterations }}" \
            --storage-dir ./var/reports-ci-benchmark-fire \
            > ../artifacts/release-readiness/benchmark-fire-compliance.json
      - name: Run stress multisource benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-stress-multisource.json \
            --iterations "${{ inputs.benchmark_iterations }}" \
            --warmup-iterations "${{ inputs.benchmark_warmup_iterations }}" \
            --storage-dir ./var/reports-ci-benchmark-stress \
            > ../artifacts/release-readiness/benchmark-stress-multisource.json
      - name: Verify benchmark helper tests
        run: pytest tests/test_benchmark_project_package.py -v --tb=short
      - name: Evaluate release benchmark thresholds
        run: |
          python -m aerobim.tools.benchmark_threshold_gate \
            --artifact-dir ../artifacts/release-readiness \
            --threshold-profile "${{ inputs.benchmark_threshold_profile }}" \
            --mode "${{ inputs.benchmark_threshold_mode }}" \
            --markdown-output ../artifacts/release-readiness/benchmark-threshold-summary.md \
            > ../artifacts/release-readiness/benchmark-threshold-evaluation.json
          cat ../artifacts/release-readiness/benchmark-threshold-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-benchmark-artifacts
          path: |
            artifacts/release-readiness/benchmark-*.json
            artifacts/release-readiness/benchmark-threshold-evaluation.json
            artifacts/release-readiness/benchmark-threshold-summary.md

  live-review-smoke:
    if: ${{ inputs.run_live_smoke }}
    runs-on: ubuntu-latest
    needs: benchmark-rails
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Create backend virtualenv for smoke harness
        run: |
          python -m venv .venv
          .venv/bin/pip install -e ".[dev,vision]"
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Install Playwright runtime package
        run: npm install --no-save playwright
        working-directory: frontend
      - name: Install Chromium for Playwright smoke capture
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run live review smoke harness
        run: |
          mkdir -p ../artifacts/release-readiness
          .venv/bin/python -m aerobim.tools.run_live_review_smoke \
            --storage-dir ./var/reports-ci-live-smoke \
            --output-dir ../frontend/artifacts/browser-smoke-ci \
            > ../artifacts/release-readiness/live-review-smoke.json
      - name: Upload live smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-readiness-live-smoke-artifacts
          path: |
            artifacts/release-readiness/live-review-smoke.json
            frontend/artifacts/browser-smoke-ci/**