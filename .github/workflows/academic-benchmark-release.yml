name: Academic Benchmark Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,vision]"
      - run: pytest tests -q --tb=short
      - name: Extraction quality gate
        run: python -m aerobim.tools.evaluate_extraction --min-macro-f1 0.70
      - name: Generate benchmark report bundle
        run: |
          python -m aerobim.tools.generate_benchmark_report \
            --output-dir ../docs/evidence
          python -m aerobim.tools.evaluate_extraction \
            --output ../artifacts/release/extraction-quality.json
      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: academic-benchmark-${{ github.ref_name }}
          path: |
            docs/evidence/benchmark-report-*.json
            docs/evidence/benchmark-report-*.md
            artifacts/release/extraction-quality.json
            artifacts/ablation-study-report.json
