name: Academic Benchmark Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-artifacts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev-lock.txt
          pip install -e . --no-deps
      - run: pytest tests -q --tb=short
      - name: Extraction quality gate
        run: python -m aerobim.tools.evaluate_extraction --min-macro-f1 0.70
      - name: Generate benchmark report bundle
        run: |
          python -m aerobim.tools.generate_benchmark_report \
            --output-dir ../docs/evidence
          python -m aerobim.tools.evaluate_extraction \
            --output ../artifacts/release/extraction-quality.json
      - name: Upload release artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: academic-benchmark-${{ github.ref_name }}
          path: |
            docs/evidence/benchmark-report-*.json
            docs/evidence/benchmark-report-*.md
            artifacts/release/extraction-quality.json
            artifacts/ablation-study-report.json
