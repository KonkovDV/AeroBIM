name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src tests
      - run: ruff format --check src tests

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,vision]"
      - run: mypy src/aerobim --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,vision]"
      - run: pytest tests -v --tb=short

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev,vision]"
      - name: Prepare benchmark artifact directory
        run: mkdir -p ../artifacts/ci-benchmark-smoke
      - name: Run baseline benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-baseline.json \
            --iterations 1 \
            --warmup-iterations 0 \
            --storage-dir ./var/reports-ci-smoke-baseline \
            > ../artifacts/ci-benchmark-smoke/project-package-baseline.json
      - name: Run fire-compliance benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-fire-compliance.json \
            --iterations 1 \
            --warmup-iterations 0 \
            --storage-dir ./var/reports-ci-smoke-fire \
            > ../artifacts/ci-benchmark-smoke/project-package-fire-compliance.json
      - name: Run stress multisource benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-stress-multisource.json \
            --iterations 1 \
            --warmup-iterations 0 \
            --storage-dir ./var/reports-ci-smoke-stress \
            > ../artifacts/ci-benchmark-smoke/project-package-stress-multisource.json
      - name: Upload benchmark-smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-benchmark-smoke-artifacts
          path: artifacts/ci-benchmark-smoke/*.json
