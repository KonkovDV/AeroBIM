name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Install contract (RT-POST-09 / RTATOM A2.5):
#   python -m pip install --upgrade "pip==25.2"
#   pip install --require-hashes -r requirements-dev-lock.txt
#   pip install -e . --no-deps
# Residual: floating pip bootstrap before pin; uv install after lock is unhashed but version-pinned.
# Regenerate locks (Linux/CI target — ifcopenshell needs manylinux_2_31):
#   uv pip compile --python 3.12 --python-platform x86_64-manylinux_2_31 --generate-hashes --extra=raster -o requirements-lock.txt pyproject.toml
#   uv pip compile --python 3.12 --python-platform x86_64-manylinux_2_31 --generate-hashes --extra=dev --extra=raster -o requirements-dev-lock.txt pyproject.toml

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain
        run: |
          python -m pip install --upgrade "pip==25.2"
          pip install --require-hashes -r requirements-dev-lock.txt
          pip install -e . --no-deps
          # Residual: uv itself is version-pinned but not hash-verified (bootstrap after lock).
          pip install "uv==0.8.22"
      - name: Lockfile drift check (runtime + dev locks must match pyproject extras)
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess
          import sys

          # Compare name==version only (ignore trailing \, markers, and hashes).
          # Locks are compiled for CI/Docker Linux (manylinux_2_31) so Windows
          # extras like colorama do not falsely trip drift.
          def pins(text: str) -> set[str]:
              out: set[str] = set()
              for line in text.splitlines():
                  s = line.strip().lower()
                  if not s or s.startswith("#") or s.startswith("--"):
                      continue
                  if "==" not in s:
                      continue
                  namever = s.rstrip("\\").strip().split(";", 1)[0].strip()
                  if "==" in namever:
                      out.add(namever)
              return out

          def check(lock_name: str, extras: list[str]) -> None:
              before = Path(lock_name).read_text(encoding="utf-8")
              out = Path(f"{lock_name}.check.txt")
              cmd = [
                  sys.executable, "-m", "uv", "pip", "compile",
                  "--python", "3.12",
                  "--python-platform", "x86_64-manylinux_2_31",
                  "--generate-hashes",
                  *extras,
                  "-o", str(out),
                  "pyproject.toml",
              ]
              subprocess.check_call(cmd)
              after = out.read_text(encoding="utf-8")
              if pins(before) != pins(after):
                  only_before = sorted(pins(before) - pins(after))
                  only_after = sorted(pins(after) - pins(before))
                  raise SystemExit(
                      f"{lock_name} is stale; regenerate via "
                      "uv pip compile --python-platform x86_64-manylinux_2_31 "
                      f"--generate-hashes ...; only_before={only_before}; "
                      f"only_after={only_after}"
                  )
              print(f"{lock_name} pin set OK")

          check("requirements-lock.txt", ["--extra=raster"])
          check("requirements-dev-lock.txt", ["--extra=dev", "--extra=raster"])
          PY
      - run: ruff check src tests
      - run: ruff format --check src tests

  docs-links:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain
        run: |
          python -m pip install --upgrade "pip==25.2"
          pip install --require-hashes -r requirements-dev-lock.txt
          pip install -e . --no-deps
      - name: Check markdown relative links
        run: python -m aerobim.tools.check_markdown_links --root ..

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain
        run: |
          python -m pip install --upgrade "pip==25.2"
          pip install --require-hashes -r requirements-dev-lock.txt
          pip install -e . --no-deps
      - run: mypy src/aerobim --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain
        run: |
          python -m pip install --upgrade "pip==25.2"
          pip install --require-hashes -r requirements-dev-lock.txt
          pip install -e . --no-deps
      - name: Pytest + coverage (single run)
        run: |
          mkdir -p ../artifacts/coverage
          pytest tests -v --tb=short \
            --cov=aerobim \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:../artifacts/coverage/coverage.xml
      - name: Upload coverage artifact
        if: success()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: backend-coverage
          path: artifacts/coverage/coverage.xml
          if-no-files-found: warn
      - name: Verify synthetic detection-precision harness contract
        run: |
          python -m aerobim.tools.evaluate_detection_precision \
            --labels ../samples/benchmarks/detection-precision/labels-synthetic.json \
            --detections ../samples/benchmarks/detection-precision/detections-synthetic.json \
            --min-precision 0.6 \
            --min-recall 0.6 \
            --min-f1 0.6
      - name: Verify IFC QA RU fixture (advisory scaffold only)
        run: |
          python -m aerobim.tools.evaluate_ifc_qa \
            --questions ../samples/benchmarks/ifc-qa-ru/questions-fixture.json \
            --ifc ../samples/ifc/wall-pset-qto-pass.ifc \
            --min-accuracy 0.5

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain
        run: |
          python -m pip install --upgrade "pip==25.2"
          pip install --require-hashes -r requirements-dev-lock.txt
          pip install -e . --no-deps
      - name: Prepare benchmark artifact directory
        run: mkdir -p ../artifacts/ci-benchmark-smoke
      - name: Run baseline benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-baseline.json \
            --iterations 1 \
            --warmup-iterations 0 \
            --storage-dir ./var/reports-ci-smoke-baseline \
            --output ../artifacts/ci-benchmark-smoke/project-package-baseline.json
      - name: Run fire-compliance benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-fire-compliance.json \
            --iterations 1 \
            --warmup-iterations 0 \
            --storage-dir ./var/reports-ci-smoke-fire \
            --output ../artifacts/ci-benchmark-smoke/project-package-fire-compliance.json
      - name: Run stress multisource benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-stress-multisource.json \
            --iterations 1 \
            --warmup-iterations 0 \
            --storage-dir ./var/reports-ci-smoke-stress \
            --output ../artifacts/ci-benchmark-smoke/project-package-stress-multisource.json
      - name: Run pilot Moscow benchmark pack
        run: |
          python -m aerobim.tools.benchmark_project_package \
            --pack ../samples/benchmarks/project-package-pilot-moscow-v1.json \
            --iterations 1 \
            --warmup-iterations 0 \
            --storage-dir ./var/reports-ci-smoke-pilot-moscow \
            --output ../artifacts/ci-benchmark-smoke/project-package-pilot-moscow-v1.json
      - name: Build benchmark-smoke summary
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          artifact_dir = Path("../artifacts/ci-benchmark-smoke")
          packs = [
            "project-package-baseline.json",
            "project-package-fire-compliance.json",
            "project-package-stress-multisource.json",
          ]

          lines = [
            "## Benchmark Smoke Summary",
            "",
            "| Pack | Avg ms | Reports/s | Issues | Requirements |",
            "|---|---:|---:|---:|---:|",
          ]

          for pack_file in packs:
            payload = json.loads((artifact_dir / pack_file).read_text(encoding="utf-8"))
            summary = payload.get("summary", {})
            measured = payload.get("measured_runs", [])
            first_run = measured[0] if measured else {}
            lines.append(
              "| {pack} | {avg} | {rps} | {issues} | {requirements} |".format(
                pack=payload.get("pack_id", pack_file),
                avg=summary.get("avg_ms", "n/a"),
                rps=summary.get("reports_per_second", "n/a"),
                issues=first_run.get("issue_count", "n/a"),
                requirements=first_run.get("requirement_count", "n/a"),
              )
            )

          summary_markdown = "\n".join(lines) + "\n"
          summary_path = artifact_dir / "benchmark-summary.md"
          summary_path.write_text(summary_markdown, encoding="utf-8")

          github_step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if github_step_summary:
            with open(github_step_summary, "a", encoding="utf-8") as handle:
              handle.write(summary_markdown)
          PY
      - name: Evaluate benchmark thresholds (advisory)
        run: |
          python -m aerobim.tools.benchmark_threshold_gate \
            --artifact-dir ../artifacts/ci-benchmark-smoke \
            --threshold-profile ../samples/benchmarks/benchmark-thresholds.json \
            --mode advisory \
            --markdown-output ../artifacts/ci-benchmark-smoke/benchmark-threshold-summary.md \
            --output ../artifacts/ci-benchmark-smoke/benchmark-threshold-evaluation.json
          cat ../artifacts/ci-benchmark-smoke/benchmark-threshold-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Evaluate benchmark thresholds (enforced)
        run: |
          python -m aerobim.tools.benchmark_threshold_gate \
            --artifact-dir ../artifacts/ci-benchmark-smoke \
            --threshold-profile ../samples/benchmarks/benchmark-thresholds.json \
            --mode enforced \
            --markdown-output ../artifacts/ci-benchmark-smoke/benchmark-threshold-enforced-summary.md \
            --output ../artifacts/ci-benchmark-smoke/benchmark-threshold-enforced-evaluation.json
          cat ../artifacts/ci-benchmark-smoke/benchmark-threshold-enforced-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark-smoke artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: ci-benchmark-smoke-artifacts
          path: |
            artifacts/ci-benchmark-smoke/*.json
            artifacts/ci-benchmark-smoke/benchmark-summary.md
            artifacts/ci-benchmark-smoke/benchmark-threshold-summary.md
            artifacts/ci-benchmark-smoke/benchmark-threshold-enforced-summary.md

  samolet-sla-smoke:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain
        run: |
          python -m pip install --upgrade "pip==25.2"
          pip install --require-hashes -r requirements-dev-lock.txt
          pip install -e . --no-deps
      - name: Samolet SLA smoke (pilot-moscow pack, 30 min gate)
        env:
          AEROBIM_PRIORITY_PROFILE: samolet
        run: |
          mkdir -p ../artifacts/samolet-sla-smoke
          python -m aerobim.tools.measure_package_sla \
            --pack ../samples/benchmarks/project-package-pilot-moscow-v1.json \
            --max-minutes 30 \
            --iterations 1 \
            --warmup-iterations 0 \
            --output ../artifacts/samolet-sla-smoke/samolet-sla-pilot-moscow-ci.json
      - name: Upload Samolet SLA artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: samolet-sla-smoke-artifacts
          path: artifacts/samolet-sla-smoke/*.json

  extraction-quality:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain
        run: |
          python -m pip install --upgrade "pip==25.2"
          pip install --require-hashes -r requirements-dev-lock.txt
          pip install -e . --no-deps
      - name: Evaluate Russian AEC extraction quality (advisory gate)
        run: |
          mkdir -p ../artifacts/extraction-quality
          python -m aerobim.tools.evaluate_extraction \
            --output ../artifacts/extraction-quality/russian-aec-extraction.json \
            --min-macro-f1 0.70
      - name: Upload extraction-quality artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: extraction-quality-artifacts
          path: artifacts/extraction-quality/*.json

  openapi-contract:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
      - name: Install locked toolchain
        run: |
          python -m pip install --upgrade "pip==25.2"
          pip install --require-hashes -r requirements-dev-lock.txt
          pip install -e . --no-deps
      - name: Export OpenAPI schema
        run: python scripts/export_openapi.py ../artifacts/openapi.json
      - name: Verify schema has expected paths
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          schema = json.loads(Path("../artifacts/openapi.json").read_text(encoding="utf-8"))
          paths = set(schema.get("paths", {}).keys())
          required = {"/health", "/v1/reports", "/v1/analyze/project-package"}
          missing = required - paths
          if missing:
              raise SystemExit(f"OpenAPI schema is missing required paths: {missing}")
          print(f"Schema OK — {len(paths)} paths present")
          PY
      - name: Upload OpenAPI schema artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: openapi-schema
          path: artifacts/openapi.json
